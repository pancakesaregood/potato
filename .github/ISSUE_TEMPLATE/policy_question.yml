name: Policy Question
description: >
  Raise a policy question or start a debate. Use this when you want to
  explore a topic but are not ready to propose a specific solution.
title: "[Question] "
labels:
  - question
  - discussion
body:
  - type: markdown
    attributes:
      value: |
        Raising a good question is a contribution.

        Use this template to open a debate, ask for input on a policy area,
        or flag something in a manifesto that needs more thought. You do
        not need to have an answer.

  - type: input
    id: question
    attributes:
      label: The question
      description: State your question as clearly as you can in one sentence.
      placeholder: "e.g. Should housing policy prioritize supply or affordability?"
    validations:
      required: true

  - type: dropdown
    id: instance
    attributes:
      label: Instance
      description: >
        Which governance instance does this question apply to?
      options:
        - Canada (PPPC)
        - Framework-level (applies to all instances)
        - Other — describe in context
    validations:
      required: true

  - type: dropdown
    id: policy_area
    attributes:
      label: Policy area
      options:
        - Digital democracy and civic technology
        - Equality and rights
        - Justice and public safety
        - Housing and homelessness
        - Environmental responsibility
        - Public health
        - Governance and accountability
        - Financial and fiscal policy
        - Climate and energy
        - Indigenous and community relations
        - Participation and electoral systems
        - Healthcare
        - Governance system design (framework-level)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: >
        Why is this question worth asking? What prompted it? Is there a gap
        in the current manifesto this question relates to?
      placeholder: |
        A sentence or two explaining why this question matters and what you
        are hoping the discussion will clarify.
    validations:
      required: true

  - type: textarea
    id: positions
    attributes:
      label: Known positions or perspectives
      description: >
        What are the main ways people disagree on this? You do not need to
        be exhaustive — list what you know.
      placeholder: |
        e.g.
        - Position A: ...
        - Position B: ...
        - Complicating factor: ...
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: Related manifesto articles or experiments
      description: >
        Which existing files in the repository are most relevant to this
        question? Reference files in your instance's `instances/<name>/manifesto/`
        directory or in `docs/experiments/`. Filenames or links are fine.
      placeholder: |
        e.g. instances/canada/manifesto/article_02_digital_democracy.md
             docs/experiments/digital_referendums.md
    validations:
      required: false

  - type: dropdown
    id: outcome
    attributes:
      label: What outcome are you hoping for?
      options:
        - I want to hear different perspectives before forming a view
        - I want to identify whether a proposal is worth writing
        - I want to flag a gap in the manifesto that someone should fill
        - I want to understand how the governance system handles this type of question
        - Something else (explain in context)
    validations:
      required: false
